<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest-display.json">
  <title>Display</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #C8A96E;
      --fg: #f0ece4;
      --bg: #0a0a0a;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    #video-wrap {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #video-wrap video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
    }

    .placeholder-inner {
      text-align: center;
      opacity: 0.15;
    }

    .placeholder-inner svg {
      width: 80px;
      height: 80px;
      fill: var(--fg);
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 56px 72px;
      pointer-events: none;
    }

    .project-meta {
      max-width: 600px;
    }

    .project-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(40px, 5vw, 72px);
      line-height: 1;
      color: var(--fg);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .project-student {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 400;
      font-size: clamp(16px, 1.6vw, 22px);
      color: rgba(240,236,228,0.6);
    }

    #progress {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }

    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
    }

    #counter {
      position: fixed;
      top: 40px;
      right: 56px;
      z-index: 4;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(240,236,228,0.35);
    }

    #logo {
      position: fixed;
      top: 40px;
      left: 56px;
      z-index: 4;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 0.15em;
      color: rgba(240,236,228,0.4);
    }

    #conn {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
    }

    #conn.connected { color: rgba(100, 200, 120, 0.7); border-color: rgba(100,200,120,0.2); }
    #conn.disconnected { color: rgba(220,80,80,0.7); border-color: rgba(220,80,80,0.2); }
    #conn.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div id="video-wrap">
    <div class="video-placeholder">
      <div class="placeholder-inner">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
    </div>
  </div>

  <div id="vignette"></div>

  <div id="overlay">
    <div class="project-meta" id="project-meta">
      <div class="project-title" id="meta-title">—</div>
      <div class="project-student" id="meta-student"></div>
    </div>
  </div>

  <div id="progress"><div id="progress-fill"></div></div>
  <div id="counter"></div>
  <div id="logo">Studio</div>
  <div id="conn">Verbinden…</div>

<script>
  let projects = [];
  let currentIndex = 0;
  let currentVideo = null;
  let ws = null;
  let wsRetryTimer = null;

  const videoWrap = document.getElementById('video-wrap');
  const conn = document.getElementById('conn');
  const progressFill = document.getElementById('progress-fill');

  async function loadProjects() {
    try {
      const r = await fetch('/projects.json');
      projects = await r.json();
    } catch(e) {
      projects = [
        { id:0, title:'Project 1', student:'Student A', video:'', color:'#C8A96E' },
        { id:1, title:'Project 2', student:'Student B', video:'', color:'#7BA3C4' },
      ];
    }
    renderProject(currentIndex);
  }

  function renderProject(index) {
    if (!projects.length) return;
    currentIndex = index;
    const p = projects[index];

    document.getElementById('meta-title').textContent = p.title || '—';
    document.getElementById('meta-student').textContent = p.student ? `by ${p.student}` : '';

    document.documentElement.style.setProperty('--accent', p.color || '#C8A96E');

    const counter = document.getElementById('counter');
    counter.textContent = String(index + 1).padStart(2,'0') + ' / ' + String(projects.length).padStart(2,'0');

    loadVideo(p.video || '', p.color);
  }

  function updateProgress() {
    if (currentVideo && currentVideo.duration) {
      const pct = (currentVideo.currentTime / currentVideo.duration) * 100;
      progressFill.style.width = pct + '%';
    }
  }

  function loadVideo(src, accentColor) {
    videoWrap.innerHTML = '';
    currentVideo = null;
    progressFill.style.width = '0%';

    if (src) {
      const video = document.createElement('video');
      video.src = src;
      video.autoplay = true;
      video.loop = true;
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';
      videoWrap.appendChild(video);
      video.play().catch(() => {});

      currentVideo = video;
      video.addEventListener('timeupdate', updateProgress);
    } else {
      const ph = document.createElement('div');
      ph.className = 'video-placeholder';
      ph.innerHTML = `
        <div class="placeholder-inner">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      `;
      ph.style.background = `linear-gradient(135deg,
        ${hexToRgb(accentColor, 0.08)} 0%,
        #0f0f0f 50%,
        ${hexToRgb(accentColor, 0.04)} 100%)`;
      videoWrap.appendChild(ph);
    }
  }

  function hexToRgb(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.addEventListener('open', () => {
      conn.textContent = 'Verbonden';
      conn.className = 'connected';
      ws.send(JSON.stringify({ type: 'register', role: 'display' }));
      setTimeout(() => conn.classList.add('hidden'), 3000);
      clearTimeout(wsRetryTimer);
    });

    ws.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'state' && msg.currentProject !== currentIndex) {
          renderProject(msg.currentProject);
        }
      } catch(e) {}
    });

    ws.addEventListener('close', () => {
      conn.textContent = 'Verbinding verbroken';
      conn.className = 'disconnected';
      conn.classList.remove('hidden');
      wsRetryTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', () => ws.close());
  }

  loadProjects().then(() => connectWS());

  if ('wakeLock' in navigator) {
    async function requestWakeLock() {
      try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }
</script>
</body>
</html>
