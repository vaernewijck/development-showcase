<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/setup.css">
  <title>Setup</title>
</head>
<body>
  <h1>Scan QR code om te verbinden</h1>
  <div class="cards">
    <div class="card">
      <h2>Controller</h2>
      <img id="qr-controller" alt="QR Controller">
      <code id="url-controller">Laden...</code>
      <a id="link-controller" href="#" target="_blank">Open</a>
    </div>
    <div class="card">
      <h2>Display 1</h2>
      <img id="qr-display-1" alt="QR Display 1">
      <code id="url-display-1">Laden...</code>
      <a id="link-display-1" href="#" target="_blank">Open</a>
    </div>
    <div class="card">
      <h2>Display 2</h2>
      <img id="qr-display-2" alt="QR Display 2">
      <code id="url-display-2">Laden...</code>
      <a id="link-display-2" href="#" target="_blank">Open</a>
    </div>
    <div class="card">
      <h2>Display 3</h2>
      <img id="qr-display-3" alt="QR Display 3">
      <code id="url-display-3">Laden...</code>
      <a id="link-display-3" href="#" target="_blank">Open</a>
    </div>
  </div>

  <script src="js/setup.js"></script>
</body>
</html>
