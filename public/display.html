<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest-display.json">
  <title>Display</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #ffffff;
      --fg: #ffffff;
      --bg: #000000;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* Video layers for crossfade */
    .video-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .video-layer.active {
      opacity: 1;
    }

    .video-layer video {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0d0d0d 100%);
    }

    .placeholder-inner {
      text-align: center;
      opacity: 0.15;
    }

    .placeholder-inner svg {
      width: 80px; height: 80px;
      fill: var(--fg);
    }

    #vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%),
        linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 35%, transparent 65%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 56px 72px;
      pointer-events: none;
    }

    .project-meta {
      max-width: 600px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .project-meta.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .project-student {
      font-weight: 700;
      font-size: clamp(40px, 5vw, 72px);
      line-height: 1;
      color: var(--fg);
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .project-year {
      font-weight: 400;
      font-size: clamp(16px, 1.6vw, 22px);
      color: rgba(255,255,255,0.6);
    }

    #progress {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      z-index: 4;
      height: 2px;
      background: rgba(255,255,255,0.08);
    }

    #progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.1s linear;
    }

    #counter {
      position: fixed;
      top: 40px;
      right: 56px;
      z-index: 4;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.35);
    }

    #conn {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4);
      transition: opacity 0.3s ease;
    }

    #conn.connected { color: rgba(100,200,120,0.7); border-color: rgba(100,200,120,0.2); }
    #conn.disconnected { color: rgba(220,80,80,0.7); border-color: rgba(220,80,80,0.2); }
    #conn.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div class="video-layer active" id="layer-a"></div>
  <div class="video-layer" id="layer-b"></div>

  <div id="vignette"></div>

  <div id="overlay">
    <div class="project-meta" id="project-meta">
      <div class="project-student" id="meta-student">—</div>
      <div class="project-year" id="meta-year"></div>
    </div>
  </div>

  <div id="progress"><div id="progress-fill"></div></div>
  <div id="counter"></div>
  <div id="conn">Verbinden…</div>

<script>
  let currentAssignment = null;
  let displayOffset = 0;
  let currentVideo = null;
  let activeLayer = 'a';
  let ws = null;
  let wsRetryTimer = null;

  // Get offset from URL (?offset=0, ?offset=1) or random
  const params = new URLSearchParams(location.search);
  if (params.has('offset')) {
    displayOffset = parseInt(params.get('offset')) || 0;
  } else {
    displayOffset = Math.floor(Math.random() * 100);
  }

  // Master display controls autoplay timing
  const isMaster = params.has('master');

  const layerA = document.getElementById('layer-a');
  const layerB = document.getElementById('layer-b');
  const conn = document.getElementById('conn');
  const progressFill = document.getElementById('progress-fill');
  const meta = document.getElementById('project-meta');

  async function loadInitialData() {
    try {
      const r = await fetch('/projects.json');
      const data = await r.json();
      if (data.assignments && data.assignments.length > 0) {
        // Show first assignment with this display's offset
        const assignment = data.assignments[0];
        const students = assignment.students || [];
        const studentIndex = students.length > 0 && displayOffset < students.length
          ? displayOffset
          : -1;
        showAssignment(assignment, studentIndex);
      }
    } catch(e) {
      showAssignment({ name: 'Demo', year: '1st year', students: [{ name: 'Student A', video: '' }] }, 0);
    }
  }

  function showAssignment(assignment, studentIndex) {
    currentAssignment = assignment;
    const students = assignment.students || [];

    // Fade out meta
    meta.classList.remove('visible');

    // Handle placeholder case (no student assigned to this display)
    if (studentIndex === -1 || students.length === 0) {
      setTimeout(() => {
        document.getElementById('meta-student').textContent = '—';
        document.getElementById('meta-year').textContent = assignment.year || '';
        document.getElementById('counter').textContent = '';
        meta.classList.add('visible');
      }, 300);

      loadVideo(''); // Show placeholder
      return;
    }

    const student = students[studentIndex];

    // Update meta after brief delay
    setTimeout(() => {
      document.getElementById('meta-student').textContent = student.name || '—';
      document.getElementById('meta-year').textContent = assignment.year || '';
      document.getElementById('counter').textContent =
        String(studentIndex + 1).padStart(2,'0') + ' / ' + String(students.length).padStart(2,'0');
      meta.classList.add('visible');
    }, 300);

    loadVideo(student.video || '');
  }


  function updateProgress() {
    if (currentVideo && currentVideo.duration) {
      const pct = (currentVideo.currentTime / currentVideo.duration) * 100;
      progressFill.style.width = pct + '%';
    }
  }

  function loadVideo(src) {
    // Get layers
    const currentLayer = activeLayer === 'a' ? layerA : layerB;
    const nextLayer = activeLayer === 'a' ? layerB : layerA;

    // Clear next layer
    nextLayer.innerHTML = '';
    progressFill.style.width = '0%';

    if (src) {
      const video = document.createElement('video');
      video.src = src;
      video.autoplay = true;
      video.muted = true;
      video.playsInline = true;
      video.preload = 'auto';

      // Master display notifies iPad when video ends
      video.loop = false;
      video.addEventListener('ended', () => {
        if (isMaster && ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: 'videoEnded' }));
        }
      });

      nextLayer.appendChild(video);
      video.play().catch(() => {});

      currentVideo = video;
      video.addEventListener('timeupdate', updateProgress);
    } else {
      const ph = document.createElement('div');
      ph.className = 'video-placeholder';
      ph.innerHTML = `<div class="placeholder-inner"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>`;
      nextLayer.appendChild(ph);
      currentVideo = null;

      // Master notifies after 5 seconds if no video (placeholder)
      if (isMaster) {
        setTimeout(() => {
          if (ws && ws.readyState === 1) {
            ws.send(JSON.stringify({ type: 'videoEnded' }));
          }
        }, 5000);
      }
    }

    // Crossfade
    currentLayer.classList.remove('active');
    nextLayer.classList.add('active');
    activeLayer = activeLayer === 'a' ? 'b' : 'a';
  }

  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.addEventListener('open', () => {
      conn.textContent = 'Verbonden';
      conn.className = 'connected';
      ws.send(JSON.stringify({ type: 'register', role: 'display', offset: displayOffset }));
      setTimeout(() => conn.classList.add('hidden'), 3000);
      clearTimeout(wsRetryTimer);
    });

    ws.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'state' && msg.assignment) {
          // Server sends personalized studentIndex for this display
          const studentIndex = typeof msg.studentIndex === 'number' ? msg.studentIndex : -1;
          showAssignment(msg.assignment, studentIndex);
        }
      } catch(e) {}
    });

    ws.addEventListener('close', () => {
      conn.textContent = 'Verbinding verbroken';
      conn.className = 'disconnected';
      conn.classList.remove('hidden');
      wsRetryTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', () => ws.close());
  }

  loadInitialData().then(() => connectWS());

  // Wake lock
  if ('wakeLock' in navigator) {
    async function requestWakeLock() {
      try { await navigator.wakeLock.request('screen'); } catch(e) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  }

</script>
</body>
</html>
