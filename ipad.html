<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projecten">
  <link rel="manifest" href="manifest-ipad.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Projecten</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #27A694;
      --olive: #7a7d63;
      --purple: #8088E7;
      --sky-blue: #75D6FF;
      --dark-blue: #276C8A;
      --accent: var(--teal);
      --fg: #f0ece4;
      --fg-secondary: var(--olive);
      --fg-dim: rgba(240,236,228,0.5);
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      height: 100dvh;
    }

    header {
      padding: calc(var(--safe-top) + 24px) 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: var(--bg);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.01em;
      color: var(--teal);
    }

    #connection-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 50px;
    }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    #connection-badge.connected { background: rgba(100,200,120,0.2); color: rgba(100,200,120,0.9); }
    #connection-badge.connected #conn-dot { background: rgba(100,200,120,0.9); }
    #connection-badge.disconnected { background: rgba(220,80,80,0.2); color: rgba(220,80,80,0.9); }
    #connection-badge.disconnected #conn-dot { background: rgba(220,80,80,0.9); }

    #main {
      overflow-y: auto;
      padding: 36px;
    }

    #projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-accent, var(--teal));
      opacity: 0;
    }

    .project-card.active {
      border-color: var(--card-accent, var(--teal));
      background: rgba(39, 166, 148, 0.1);
    }

    .project-card.active::before {
      opacity: 1;
    }

    .project-card-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 24px;
      line-height: 1.2;
      color: var(--card-accent, var(--teal));
      margin-bottom: 8px;
    }

    .project-card-student {
      font-size: 14px;
      font-weight: 400;
      color: var(--fg-dim);
      margin-bottom: 12px;
    }

    .project-card-keywords {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      color: var(--olive);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .project-card-description {
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--fg);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Projecten</div>
    <div id="connection-badge" class="connecting">
      <div id="conn-dot"></div>
      <span id="conn-label">VERBINDEN</span>
    </div>
  </header>

  <div id="main">
    <div id="projects-grid"></div>
  </div>
</div>

<script>
  let projects = [];
  let currentIndex = -1;
  let ws = null;
  let wsRetryTimer = null;

  async function loadProjects() {
    try {
      const r = await fetch('/projects.json');
      projects = await r.json();
    } catch(e) {
      projects = [
        { id:0, title:'Demo Project 1', student:'Student A', keywords:['demo'], description:'Demo project.', video:'', color:'#27A694' },
        { id:1, title:'Demo Project 2', student:'Student B', keywords:['demo'], description:'Demo project.', video:'', color:'#8088E7' },
      ];
    }
    buildGrid();
  }

  function buildGrid() {
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = '';

    projects.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.id = `project-${i}`;
      card.style.setProperty('--card-accent', p.color || '#27A694');

      const keywords = (p.keywords || []).join(' · ');

      card.innerHTML = `
        <div class="project-card-title">${p.title || ''}</div>
        ${p.student ? `<div class="project-card-student">by ${p.student}</div>` : ''}
        ${keywords ? `<div class="project-card-keywords">${keywords}</div>` : ''}
        <div class="project-card-description">${p.description || ''}</div>
      `;

      card.addEventListener('click', () => selectProject(i));
      grid.appendChild(card);
    });
  }

  function selectProject(index) {
    if (index < 0 || index >= projects.length) return;
    currentIndex = index;

    document.querySelectorAll('.project-card').forEach((card, i) => {
      card.classList.toggle('active', i === index);
    });

    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: 'navigate',
        direction: 'goto',
        index,
        total: projects.length
      }));
    }
  }

  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}`;
    console.log('Connecting to:', wsUrl);

    try {
      ws = new WebSocket(wsUrl);
    } catch(e) {
      console.error('WebSocket create error:', e);
      updateConnBadge('disconnected', 'Error');
      return;
    }

    ws.addEventListener('open', () => {
      console.log('WebSocket open');
      updateConnBadge('connected', 'Live');
      ws.send(JSON.stringify({ type: 'register', role: 'ipad' }));
      clearTimeout(wsRetryTimer);
    });

    ws.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        console.log('Message:', msg);
        if (msg.type === 'state' && msg.currentProject !== currentIndex) {
          currentIndex = msg.currentProject;
          document.querySelectorAll('.project-card').forEach((card, i) => {
            card.classList.toggle('active', i === currentIndex);
          });
        }
      } catch(e) {}
    });

    ws.addEventListener('close', (e) => {
      console.log('WebSocket closed:', e.code, e.reason);
      updateConnBadge('disconnected', 'Offline');
      wsRetryTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', (e) => {
      console.error('WebSocket error:', e);
      ws.close();
    });
  }

  function updateConnBadge(state, label) {
    const badge = document.getElementById('connection-badge');
    const lbl = document.getElementById('conn-label');
    badge.className = state;
    lbl.textContent = label.toUpperCase();
  }

  loadProjects().then(() => connectWS());

  // Debug logging on badge click
  document.getElementById('connection-badge').addEventListener('click', () => {
    const wsState = ws ? ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'][ws.readyState] : 'NULL';
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}`;
    alert(`WebSocket: ${wsState}\nURL: ${wsUrl}\nProjects: ${projects.length}`);
  });

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').catch(() => {});
      }
    });
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw-ipad.js').catch(() => {});
  }
</script>
</body>
</html>
