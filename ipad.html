<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Projecten">
  <link rel="manifest" href="manifest-ipad.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Projecten</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal: #27A694;
      --olive: #7a7d63;
      --fg: #f0ece4;
      --fg-dim: rgba(240,236,228,0.5);
      --bg: #0a0a0a;
      --surface: #141414;
      --border: rgba(255,255,255,0.1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      height: 100dvh;
    }

    /* Header */
    header {
      padding: calc(var(--safe-top) + 24px) 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 10;
    }

    .logo {
      font-weight: 700;
      font-size: 28px;
      color: var(--teal);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Mode toggle */
    #mode-toggle {
      display: flex;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 4px;
    }

    .mode-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--fg-dim);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 6px;
    }

    .mode-btn.active {
      background: var(--teal);
      color: var(--bg);
    }

    /* Connection badge */
    #connection-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 50px;
    }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.5);
    }

    #connection-badge.connected { background: rgba(100,200,120,0.2); color: rgba(100,200,120,0.9); }
    #connection-badge.connected #conn-dot { background: rgba(100,200,120,0.9); }
    #connection-badge.disconnected { background: rgba(220,80,80,0.2); color: rgba(220,80,80,0.9); }
    #connection-badge.disconnected #conn-dot { background: rgba(220,80,80,0.9); }

    /* Main content */
    #main {
      overflow-y: auto;
      padding: 36px;
    }

    /* Overview mode - Grid */
    #projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--card-accent, var(--teal));
      opacity: 0;
    }

    .project-card.active {
      border-color: var(--card-accent, var(--teal));
      background: rgba(39, 166, 148, 0.1);
    }

    .project-card.active::before {
      opacity: 1;
    }

    .project-card-title {
      font-weight: 700;
      font-size: 20px;
      line-height: 1.2;
      color: var(--card-accent, var(--teal));
      margin-bottom: 6px;
    }

    .project-card-student {
      font-size: 14px;
      color: var(--fg-dim);
    }

    /* Detail mode */
    #detail-view {
      display: none;
      height: 100%;
      padding: 20px;
    }

    #detail-view.active {
      display: flex;
      flex-direction: column;
    }

    .detail-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 8px;
      padding: 48px;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .detail-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: var(--card-accent, var(--teal));
    }

    .detail-title {
      font-weight: 700;
      font-size: 48px;
      line-height: 1.1;
      color: var(--card-accent, var(--teal));
      margin-bottom: 12px;
    }

    .detail-student {
      font-size: 24px;
      color: var(--fg-dim);
      margin-bottom: 32px;
    }

    .detail-keywords {
      font-size: 16px;
      font-weight: 700;
      color: var(--olive);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .detail-description {
      font-size: 20px;
      line-height: 1.6;
      color: var(--fg);
      padding-top: 24px;
      border-top: 1px solid var(--border);
      flex: 1;
    }

    .detail-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      gap: 16px;
    }

    .detail-nav {
      display: flex;
      gap: 8px;
    }

    .detail-nav button {
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg-dim);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
    }

    .detail-nav button:active {
      background: rgba(255,255,255,0.1);
    }

    .detail-counter {
      font-size: 13px;
      color: var(--fg-dim);
    }

    .detail-logo {
      font-size: 13px;
      font-weight: 700;
      color: var(--fg-dim);
      letter-spacing: 0.1em;
    }

    .back-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg-dim);
      font-family: inherit;
      font-size: 12px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
      z-index: 10;
    }

    /* Hide grid in detail mode */
    body.detail-mode #projects-grid { display: none; }
    body.detail-mode #detail-view { display: flex; }
    body.detail-mode header { display: none; }
    body.detail-mode #main { padding: calc(var(--safe-top) + 20px) 20px 20px; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Projecten</div>
    <div class="header-right">
      <div id="mode-toggle">
        <button class="mode-btn active" data-mode="overview">Overzicht</button>
        <button class="mode-btn" data-mode="detail">Detail</button>
      </div>
      <div id="connection-badge" class="connecting">
        <div id="conn-dot"></div>
        <span id="conn-label">VERBINDEN</span>
      </div>
    </div>
  </header>

  <div id="main">
    <div id="projects-grid"></div>
    <div id="detail-view">
      <button class="back-btn" id="back-btn">Overzicht</button>
      <div class="detail-card" id="detail-card">
        <div class="detail-title" id="detail-title">—</div>
        <div class="detail-student" id="detail-student"></div>
        <div class="detail-keywords" id="detail-keywords"></div>
        <div class="detail-description" id="detail-description"></div>
      </div>
      <div class="detail-footer">
        <div class="detail-logo">DEVINE</div>
        <div class="detail-counter" id="detail-counter">1 / 10</div>
        <div class="detail-nav">
          <button id="prev-btn">←</button>
          <button id="next-btn">→</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let projects = [];
  let currentIndex = -1;
  let currentMode = 'overview';
  let ws = null;
  let wsRetryTimer = null;

  async function loadProjects() {
    try {
      const r = await fetch('/projects.json');
      projects = await r.json();
    } catch(e) {
      projects = [
        { id:0, title:'Demo Project 1', student:'Student A', keywords:['demo'], description:'Demo project beschrijving hier.', video:'', color:'#27A694' },
        { id:1, title:'Demo Project 2', student:'Student B', keywords:['demo'], description:'Demo project beschrijving hier.', video:'', color:'#8088E7' },
      ];
    }
    buildGrid();
    if (projects.length > 0 && currentIndex === -1) {
      currentIndex = 0;
      updateDetailView();
    }
  }

  function buildGrid() {
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = '';

    projects.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.style.setProperty('--card-accent', p.color || '#27A694');

      card.innerHTML = `
        <div class="project-card-title">${p.title || ''}</div>
        ${p.student ? `<div class="project-card-student">by ${p.student}</div>` : ''}
      `;

      card.addEventListener('click', () => selectProject(i));
      grid.appendChild(card);
    });

    updateActiveCard();
  }

  function updateActiveCard() {
    document.querySelectorAll('.project-card').forEach((card, i) => {
      card.classList.toggle('active', i === currentIndex);
    });
  }

  function updateDetailView() {
    if (currentIndex < 0 || currentIndex >= projects.length) return;
    const p = projects[currentIndex];

    document.getElementById('detail-title').textContent = p.title || '—';
    document.getElementById('detail-student').textContent = p.student ? `by ${p.student}` : '';
    document.getElementById('detail-keywords').textContent = (p.keywords || []).join(' · ');
    document.getElementById('detail-description').textContent = p.description || '';
    document.getElementById('detail-card').style.setProperty('--card-accent', p.color || '#27A694');
    document.getElementById('detail-counter').textContent = `${currentIndex + 1} / ${projects.length}`;
  }

  function selectProject(index) {
    if (index < 0 || index >= projects.length) return;
    currentIndex = index;

    updateActiveCard();
    updateDetailView();

    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: 'navigate',
        direction: 'goto',
        index,
        total: projects.length
      }));
    }
  }

  function setMode(mode) {
    currentMode = mode;
    document.body.classList.toggle('detail-mode', mode === 'detail');
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.mode === mode);
    });
  }

  // Mode toggle
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  // Detail nav buttons
  document.getElementById('prev-btn').addEventListener('click', () => {
    if (currentIndex > 0) selectProject(currentIndex - 1);
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    if (currentIndex < projects.length - 1) selectProject(currentIndex + 1);
  });

  document.getElementById('back-btn').addEventListener('click', () => {
    setMode('overview');
  });

  // WebSocket
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}`;

    try {
      ws = new WebSocket(wsUrl);
    } catch(e) {
      updateConnBadge('disconnected', 'Error');
      return;
    }

    ws.addEventListener('open', () => {
      updateConnBadge('connected', 'Live');
      ws.send(JSON.stringify({ type: 'register', role: 'ipad' }));
      clearTimeout(wsRetryTimer);
    });

    ws.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'state' && msg.currentProject !== currentIndex) {
          currentIndex = msg.currentProject;
          updateActiveCard();
          updateDetailView();
        }
      } catch(e) {}
    });

    ws.addEventListener('close', () => {
      updateConnBadge('disconnected', 'Offline');
      wsRetryTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', () => ws.close());
  }

  function updateConnBadge(state, label) {
    const badge = document.getElementById('connection-badge');
    document.getElementById('conn-label').textContent = label.toUpperCase();
    badge.className = state;
  }

  loadProjects().then(() => connectWS());

  // Debug on badge click
  document.getElementById('connection-badge').addEventListener('click', () => {
    const wsState = ws ? ['CONNECTING', 'OPEN', 'CLOSING', 'CLOSED'][ws.readyState] : 'NULL';
    alert(`WebSocket: ${wsState}\nProjects: ${projects.length}\nMode: ${currentMode}`);
  });

  // Wake lock
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').catch(() => {});
      }
    });
  }

  // Service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw-ipad.js').catch(() => {});
  }
</script>
</body>
</html>
