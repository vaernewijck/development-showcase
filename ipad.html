<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#27A694">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Projecten">
  <link rel="manifest" href="manifest-ipad.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Projecten</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Primary colors from Figma */
      --teal: #27A694;
      --olive: #A1A685;
      --purple: #8088E7;
      --sky-blue: #75D6FF;
      --dark-blue: #276C8A;

      /* Functional colors */
      --accent: var(--teal);
      --fg: #000000;
      --fg-secondary: var(--olive);
      --fg-dim: rgba(0,0,0,0.5);
      --bg: #FFFFFF;
      --surface: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --transition: 500ms cubic-bezier(0.4, 0, 0.2, 1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: 'IBM Plex Sans', sans-serif;
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Layout ───────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100%;
      height: 100dvh;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      padding: calc(var(--safe-top) + 24px) 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--olive);
      background: var(--bg);
      position: relative;
      z-index: 10;
    }

    .logo {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.01em;
      color: var(--teal);
    }

    #connection-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--dark-blue);
      background: var(--sky-blue);
      padding: 10px 20px;
      border-radius: 50px;
      transition: all 400ms ease;
    }

    #conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--dark-blue);
      transition: background 400ms ease;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #connection-badge.connected { background: #A1E8AF; color: #1a5c2a; }
    #connection-badge.connected #conn-dot { background: #1a5c2a; animation: none; }
    #connection-badge.disconnected { background: #FFB3B3; color: #8B0000; }
    #connection-badge.disconnected #conn-dot { background: #8B0000; animation: none; }

    /* ── Main project grid ────────────────────────────── */
    #main {
      overflow-y: auto;
      padding: 36px;
    }

    #projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }

    .project-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      opacity: 0;
      -webkit-transform: translateY(20px);
      transform: translateY(20px);
      -webkit-transition: opacity 0.3s ease, -webkit-transform 0.3s ease, border-color 0.2s ease, background 0.2s ease;
      transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .project-card.visible {
      opacity: 1;
      -webkit-transform: translateY(0);
      transform: translateY(0);
    }

    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--card-accent, var(--teal));
      opacity: 0;
      -webkit-transition: opacity 0.2s ease;
      transition: opacity 0.2s ease;
    }

    .project-card.active {
      border-color: var(--card-accent, var(--teal));
      background: rgba(39, 166, 148, 0.05);
    }

    .project-card.active::before {
      opacity: 1;
    }

    .project-card.tap {
      -webkit-transform: scale(0.96);
      transform: scale(0.96);
    }

    .project-card-title {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 700;
      font-size: 24px;
      line-height: 1.2;
      color: var(--card-accent, var(--teal));
      margin-bottom: 8px;
    }

    .project-card-student {
      font-size: 14px;
      font-weight: 400;
      color: var(--fg-dim);
      margin-bottom: 12px;
    }

    .project-card-keywords {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      color: var(--olive);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .project-card-description {
      padding-top: 14px;
      border-top: 1px solid var(--olive);
      font-size: 15px;
      font-weight: 400;
      line-height: 1.5;
      color: var(--fg);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }


  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Projecten</div>
    <div id="connection-badge" class="connecting">
      <div id="conn-dot"></div>
      <span id="conn-label">VERBINDEN</span>
    </div>
  </header>

  <div id="main">
    <div id="projects-grid">
      <!-- Project cards injected by JS -->
    </div>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────────
  let projects = [];
  let currentIndex = -1;
  let ws = null;
  let wsRetryTimer = null;

  // ── Load projects ─────────────────────────────────────────────────────
  async function loadProjects() {
    try {
      const r = await fetch('/projects.json');
      projects = await r.json();
    } catch(e) {
      projects = generateDemoProjects();
    }
    buildGrid();
  }

  function generateDemoProjects() {
    return [
      { id:0, title:'Creative Coding', student:'Femke De Latter', keywords:['GSAP', 'ml5.js', 'scrollytelling'], description:'Design and develop an interactive desktop application that brings a personal story to life.', video:'', color:'#27A694' },
      { id:1, title:'Creative Coding', student:'Femke Denoo', keywords:['scrollytelling'], description:'Design and develop an interactive desktop application combining machine learning and animation.', video:'', color:'#27A694' },
      { id:2, title:'Creative Coding', student:'Naomi Desmet', keywords:['GSAP', 'ml5.js'], description:'Bring a personal story, experience or theme to life. Think in terms of experience.', video:'', color:'#8088E7' },
    ];
  }

  // ── Build grid ────────────────────────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById('projects-grid');
    grid.innerHTML = '';

    projects.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'project-card';
      card.id = `project-${i}`;
      card.style.setProperty('--card-accent', p.color || '#27A694');

      // Format keywords
      const keywords = (p.keywords || []).join(' · ');

      card.innerHTML = `
        <div class="project-card-title">${p.title || ''}</div>
        ${p.student ? `<div class="project-card-student">by ${p.student}</div>` : ''}
        ${keywords ? `<div class="project-card-keywords">${keywords}</div>` : ''}
        <div class="project-card-description">${p.description || ''}</div>
      `;

      // Tap animation
      card.addEventListener('touchstart', () => card.classList.add('tap'), { passive: true });
      card.addEventListener('touchend', () => card.classList.remove('tap'), { passive: true });
      card.addEventListener('touchcancel', () => card.classList.remove('tap'), { passive: true });

      card.addEventListener('click', () => selectProject(i));
      grid.appendChild(card);

      // Staggered fade in
      setTimeout(() => card.classList.add('visible'), 50 + i * 80);
    });
  }

  // ── Select project ────────────────────────────────────────────────────
  function selectProject(index) {
    if (index < 0 || index >= projects.length) return;
    currentIndex = index;
    const p = projects[index];

    // Update active state
    document.querySelectorAll('.project-card').forEach((card, i) => {
      card.classList.toggle('active', i === index);
    });

    // Send to display
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({
        type: 'navigate',
        direction: 'goto',
        index,
        total: projects.length
      }));
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────
  function connectWS() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}`);

    ws.addEventListener('open', () => {
      updateConnBadge('connected', 'Live');
      ws.send(JSON.stringify({ type: 'register', role: 'ipad' }));
      clearTimeout(wsRetryTimer);
    });

    ws.addEventListener('message', (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        if (msg.type === 'state' && msg.currentProject !== currentIndex) {
          currentIndex = msg.currentProject;
          document.querySelectorAll('.project-card').forEach((card, i) => {
            card.classList.toggle('active', i === currentIndex);
          });
        }
      } catch(e) {}
    });

    ws.addEventListener('close', () => {
      updateConnBadge('disconnected', 'Offline');
      wsRetryTimer = setTimeout(connectWS, 3000);
    });

    ws.addEventListener('error', () => ws.close());
  }

  function updateConnBadge(state, label) {
    const badge = document.getElementById('connection-badge');
    const lbl = document.getElementById('conn-label');
    badge.className = state;
    lbl.textContent = label.toUpperCase();
  }

  // ── Init ──────────────────────────────────────────────────────────────
  loadProjects().then(() => connectWS());

  // Wake lock for iPad
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.wakeLock.request('screen').catch(() => {});
      }
    });
  }

  // Register service worker for PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw-ipad.js').catch(() => {});
  }
</script>
</body>
</html>
